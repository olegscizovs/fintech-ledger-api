framework:
    rate_limiter:
        api_limiter:
            policy: 'token_bucket'
            limit: 1000
            # Changed 'period' to 'interval' to match Symfony's current configuration specs
            rate: { amount: 1000, interval: '60 seconds' }
            cache_pool: 'cache.rate_limiter'

    cache:
        pools:
            cache.rate_limiter:
                adapter: cache.adapter.redis
                provider: '%env(REDIS_URL)%'
