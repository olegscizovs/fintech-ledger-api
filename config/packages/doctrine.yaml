doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        options:
            20: true
    orm:
        default_entity_manager: default
        entity_managers:
            default:
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                auto_mapping: true
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src'
                        prefix: 'App'
                        alias: App
